services:
  postgres:
    image: postgres:16-alpine
    container_name: telemed-postgres
    restart: unless-stopped
    networks:
      - telemed
    environment:
      POSTGRES_USER: telemed
      POSTGRES_PASSWORD: telemed
      POSTGRES_DB: telemed
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U telemed']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telemed-redis
    restart: unless-stopped
    networks:
      - telemed
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: telemed-minio
    restart: unless-stopped
    networks:
      - telemed
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: telemed
      MINIO_ROOT_PASSWORD: telemed-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: telemed-minio-init
    networks:
      - telemed
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 telemed telemed-secret &&
      (mc mb local/telemed-files || true) &&
      mc anonymous set download local/telemed-files &&
      exit 0
      "

  livekit:
    image: livekit/livekit-server:latest
    container_name: telemed-livekit
    restart: unless-stopped
    # On Windows/macOS Docker Desktop runs in a VM, so network_mode: host
    # does NOT expose ports to the host. Use bridge mode with explicit ports.
    # On Linux you can switch back to `network_mode: host` and remove `ports:`.
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'
    command: --config /etc/livekit.yaml --node-ip 172.30.0.10
    networks:
      telemed:
        ipv4_address: 172.30.0.10
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro

  livekit-egress:
    image: livekit/egress:latest
    container_name: telemed-livekit-egress
    restart: unless-stopped
    networks:
      - telemed
    volumes:
      - ./infra/livekit/egress.yaml:/etc/egress.yaml:ro
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml

  mailhog:
    image: mailhog/mailhog:latest
    container_name: telemed-mailhog
    restart: unless-stopped
    networks:
      - telemed
    ports:
      - '1025:1025'
      - '8025:8025'

networks:
  telemed:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres-data:
  redis-data:
  minio-data:
